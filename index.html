<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hachi+Maru+Pop&family=Inder&family=Indie+Flower&family=Inika:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Soren</title>
</head>
<body>
    <div id="titleScreen" class="page active">
        <h1 id="title">Soren</h1>
        <button id="startButton">Start</button>
        <button id="continueButton">Continue</button>
    </div>
    <div id="dialogueScreen" class="page">
        <div id="backgroundOverlay"></div> 
        <canvas id="statusBars"></canvas>
        <img src="assets/Icon.png" class="optionsButton">
        <div class="optionsMenu centered">
            <button class="homeButton">Home</button>
            <button class="logsButton">Chat logs</button>
            <button class="statusButton">Show/Hide Status Bars</button>
        </div>
        <div class="chatLog centered"></div>
        <div id="dialogueAndSprites">
            <img src="assets/SorenGB.png" id="playerSprite">
            <img src="assets/AlanGB.png" id="otherSprite">
            <div id="dialogueBoxAndTag">
                <div id="speakerTag">
                    <p id="speakerName">Speaker</p>
                </div>
                <div id="dialogueBox">
                    <p id="dialogueText">Placeholder text</p>
                </div>
            </div>
        </div>
        <div id="choiceOverlay">
            <button id="choice1" class="choice">Choice 1</button>
            <button id="choice2" class="choice">Choice 2</button>
            <button id="choice3" class="choice">Choice 3</button>
        </div>
    </div>
    <div id="combatScreen" class="page">
        <img src="assets/Icon.png" class="optionsButton">
        <div class="optionsMenu centered">
            <button class="homeButton">Home</button>
        </div>
        <div id="logAndSprites">
            <div id="playerSpriteAndHP">
                <div id="playerHPBar"><canvas id="playerHPBarCanvas"></canvas></div>
                <img src="assets/sorenCombatNight.png" id="playerCombatSprite">
            </div>
            <div id="enemySpriteAndHP">
                <div id="enemyHPBar"><canvas id="enemyHPBarCanvas"></canvas></div>
                <img src="assets/tiredBusinessWomanNight.png" id="enemyCombatSprite">
            </div>
            <div id="combatLogBox"></div>
            <div id="combatButtons">
                <button id="attackButton" class = "combatButton">Fight</button>
                <button id="itemButton" class = "combatButton">Item</button>
                <button id="spareButton" class = "combatButton">Spare</button>
            </div>
        </div>
    </div>
    <div id="endingScreen" class="page">
        <div id="endingBox" class="centered">
            <h2 id="endingTitle">Placeholder text</h2>
            <p id="endingBody">Placeholder text</p>
            <div id="endingButtons">
                <button id="viewChoicesButton">View Choices</button>
                <button class="homeButton">Home</button>
            </div>
        </div>
        <div id="choiceLogAndOverlay">
            <div id="choiceLog" class="centered"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
